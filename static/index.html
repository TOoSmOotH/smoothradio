<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmoothRadio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .player {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .player h2 { margin-bottom: 1rem; font-size: 1.2rem; }
        audio { width: 100%; margin: 1rem 0; }
        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn:hover { background: #c73e54; }
        .tracks {
            margin-top: 2rem;
            width: 100%;
            max-width: 500px;
        }
        .tracks h2 { margin-bottom: 1rem; }
        .track-list { list-style: none; }
        .track-list li {
            background: #16213e;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .track-list li:hover { background: #1a2744; }
        .track-title { font-weight: bold; }
        .track-artist { color: #888; }
    </style>
</head>
<body>
    <h1>SmoothRadio</h1>
    <p class="subtitle">AI-powered streaming radio</p>

    <div class="player">
        <h2 id="now-playing">Ready to play</h2>
        <audio id="audio" controls></audio>
        <br>
        <button class="btn" id="play-radio">Play Radio</button>
    </div>

    <div class="tracks">
        <h2>Library</h2>
        <ul class="track-list" id="track-list"></ul>
    </div>

    <script>
        const audio = document.getElementById("audio");
        const nowPlaying = document.getElementById("now-playing");
        const trackList = document.getElementById("track-list");

        document.getElementById("play-radio").addEventListener("click", () => {
            audio.src = "/stream";
            audio.play();
            nowPlaying.textContent = "Streaming live radio";
        });

        async function loadTracks() {
            try {
                const res = await fetch("/api/tracks");
                const data = await res.json();
                trackList.innerHTML = "";
                data.tracks.forEach(track => {
                    const li = document.createElement("li");
                    li.innerHTML = `
                        <span>
                            <span class="track-title">${escapeHtml(track.title)}</span>
                            <span class="track-artist"> - ${escapeHtml(track.artist)}</span>
                        </span>
                        <span>${formatDuration(track.duration)}</span>
                    `;
                    li.addEventListener("click", () => {
                        audio.src = "/stream/" + track.id;
                        audio.play();
                        nowPlaying.textContent = track.title + " - " + track.artist;
                    });
                    trackList.appendChild(li);
                });
            } catch (e) {
                trackList.innerHTML = "<li>No tracks found</li>";
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDuration(seconds) {
            if (!seconds) return "--:--";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ":" + s.toString().padStart(2, "0");
        }

        loadTracks();
    </script>
</body>
</html>
