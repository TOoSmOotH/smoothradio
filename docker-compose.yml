services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_DB}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - ${DATABASE_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - smoothradio_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:latest
    ports:
      - "${VALKEY_PORT}:6379"
    volumes:
      - ${VALKEY_DATA_PATH}:/data
    networks:
      - smoothradio_net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${PORT}:3000"
    environment:
      - DATABASE_URL=postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/${DATABASE_DB}
      - VALKEY_URL=redis://valkey:6379
      - SECRET_STORE_KEY=${SECRET_STORE_KEY}
      - MUSIC_LIBRARY_PATH=${MUSIC_LIBRARY_PATH}
    volumes:
      - ${MUSIC_LIBRARY_PATH}:/music:ro
    networks:
      - smoothradio_net
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - DATABASE_URL=postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/${DATABASE_DB}
      - VALKEY_URL=redis://valkey:6379
      - SECRET_STORE_KEY=${SECRET_STORE_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_ENDPOINT=${LLM_ENDPOINT}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MUSIC_LIBRARY_PATH=${MUSIC_LIBRARY_PATH}
    volumes:
      - ${MUSIC_LIBRARY_PATH}:/music:ro
    networks:
      - smoothradio_net
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
    ports:
      - "${ADMIN_UI_PORT}:3001"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    networks:
      - smoothradio_net
    depends_on:
      - api
    restart: unless-stopped

networks:
  smoothradio_net:
    driver: bridge
